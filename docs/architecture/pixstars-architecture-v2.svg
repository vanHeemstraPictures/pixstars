<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f7f7f7; }
      .panel { fill: white; stroke: #222; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 30px Arial, sans-serif; fill: #111; }
      .subtitle { font: 600 22px Arial, sans-serif; fill: #111; }
      .text { font: 18px Arial, sans-serif; fill: #222; }
      .small { font: 16px Arial, sans-serif; fill: #333; }
      .line { stroke: #333; stroke-width: 3; fill: none; }
      .dash { stroke: #666; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
      .chip { fill: #eef4ff; stroke: #356; stroke-width: 2; rx: 12; ry: 12; }
      .io { fill: #fdf7e3; stroke: #876; stroke-width: 2; rx: 12; ry: 12; }
      .accent { fill: #e8fff0; stroke: #274; stroke-width: 2; rx: 12; ry: 12; }
      .warn { fill: #fff0f0; stroke: #944; stroke-width: 2; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="title" x="60" y="60">PIXSTARS Architecture v2</text>
  <text class="text" x="60" y="95">English export with Raspberry Pi Zero 2 WH in the lamp head, RK3588-40 and PCIe AI accelerator in the lamp base</text>

  <rect class="panel" x="60" y="140" width="420" height="260"/>
  <text class="subtitle" x="90" y="185">Backstage</text>
  <rect class="chip" x="90" y="215" width="360" height="80"/>
  <text class="subtitle" x="115" y="260">Apple Mac Mini M4 Pro</text>
  <text class="small" x="115" y="285">Director • Ardour • HiveMind • Home Assistant</text>
  <rect class="accent" x="90" y="315" width="360" height="55"/>
  <text class="text" x="115" y="350">Wi-Fi / MQTT / HiveMind link to lamp</text>

  <rect class="panel" x="540" y="120" width="1000" height="700"/>
  <text class="subtitle" x="570" y="165">Lamp</text>

  <rect class="panel" x="580" y="200" width="920" height="230"/>
  <text class="subtitle" x="610" y="240">Lamp head</text>

  <rect class="chip" x="610" y="270" width="360" height="90"/>
  <text class="subtitle" x="635" y="315">Raspberry Pi Zero 2 WH</text>
  <text class="small" x="635" y="340">Nervous System • local I/O • LEDs • audio • sensors</text>

  <rect class="io" x="1010" y="260" width="220" height="55"/>
  <text class="text" x="1035" y="295">Camera</text>

  <rect class="io" x="1010" y="330" width="220" height="55"/>
  <text class="text" x="1035" y="365">Microphone + speaker</text>

  <rect class="warn" x="1255" y="250" width="215" height="65"/>
  <text class="text" x="1278" y="290">Rear-facing LED ring</text>

  <rect class="accent" x="1255" y="335" width="215" height="65"/>
  <text class="text" x="1278" y="375">Front magnetic bulb</text>

  <text class="small" x="1260" y="425">Bulb replacement element, front-facing</text>
  <text class="small" x="1260" y="445">LED ring faces back toward shade vents</text>

  <rect class="panel" x="580" y="500" width="920" height="260"/>
  <text class="subtitle" x="610" y="540">Lamp base</text>

  <rect class="chip" x="610" y="575" width="360" height="90"/>
  <text class="subtitle" x="635" y="620">reComputer RK3588-40</text>
  <text class="small" x="635" y="645">AI Brain • OVOS • speech • vision • behaviour</text>

  <rect class="chip" x="1010" y="575" width="300" height="90"/>
  <text class="subtitle" x="1035" y="620">PCIe AI accelerator</text>
  <text class="small" x="1035" y="645">Vision / inference coprocessor</text>

  <rect class="io" x="1335" y="575" width="135" height="90"/>
  <text class="text" x="1360" y="620">Power</text>
  <text class="small" x="1355" y="645">network</text>

  <line class="line" x1="450" y1="340" x2="580" y2="340" marker-end="url(#arrow)"/>
  <line class="line" x1="790" y1="360" x2="790" y2="500" marker-end="url(#arrow)"/>
  <line class="dash" x1="970" y1="315" x2="1010" y2="290"/>
  <line class="dash" x1="970" y1="315" x2="1010" y2="360"/>
  <line class="dash" x1="970" y1="315" x2="1255" y2="282"/>
  <line class="dash" x1="970" y1="315" x2="1255" y2="367"/>
  <line class="dash" x1="970" y1="620" x2="1010" y2="620"/>

  <text class="small" x="820" y="485">Internal link through lamp arm</text>
</svg>
