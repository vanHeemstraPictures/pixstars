<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixstars — Stage Digital Twin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #renderCanvas {
      width: 100%;
      height: 100%;
      touch-action: none;
      outline: none;
    }
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    #hud .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    #hud .status { opacity: 0.7; margin-bottom: 4px; }
    #hud .cue { font-size: 16px; color: #0ff; margin-top: 8px; }
    #connection {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 4px 12px;
      border-radius: 12px;
      font-family: 'SF Mono', monospace;
      font-size: 12px;
      pointer-events: none;
    }
    #connection.connected { background: #0a3; color: #fff; }
    #connection.disconnected { background: #a00; color: #fff; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="hud">
    <div class="title">PIXSTARS — Digital Twin</div>
    <div class="status" id="hudTransport">Transport: STOPPED</div>
    <div class="status" id="hudLamp">Lamp: INERT</div>
    <div class="status" id="hudLighting">Lighting: BLACKOUT</div>
    <div class="status" id="hudProjection">Projection: BLACKOUT</div>
    <div class="cue" id="hudCue">Cue: —</div>
  </div>
  <div id="connection" class="disconnected">DISCONNECTED</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
